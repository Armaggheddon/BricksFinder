services:
  clip_finetuning:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: clip_finetuning
    volumes:
      - ./finetuned_weights:/clip_finetune
      - ../lego_bricks_dataset/processed_data:/lego_bricks_dataset/processed_data
    command: python3 finetune.py
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
